[project]
name = "homecontrol-auth"
version = "0.1.0"
authors = [{ name = "2851999", email = "2851999@users.noreply.github.com" }]
description = "A REST API providing authentication for HomeControl."
readme = "README.md"
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = ["bcrypt>=5.0.0", "homecontrol-base-api", "pyjwt>=2.10.1"]

[dependency-groups]
dev = ["ruff>=0.15.18"]

[tool.uv]
exclude-newer = "7 days"

[tool.uv.sources]
homecontrol-base-api = { path = "../homecontrol-base-api" }

[build-system]
requires = ["uv_build>=0.11.23,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "."
